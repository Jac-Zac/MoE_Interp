[project]
name = "moe-interp"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "ipykernel>=7.1.0",
    "ipywidgets>=8.1.8",
    "jupyter>=1.1.1",
    "nnsight>=0.5.15",
    "torch>=2.5.0,<2.10",
    "tqdm>=4.67.3",
    "transformers>=4.46.0",
]

# PyTorch sources: PyPI for macOS (MPS support), CUDA index for Linux
[tool.uv.sources]
torch = [
    { index = "pytorch-cu124", marker = "sys_platform == 'linux'" },
]
[[tool.uv.index]]
name = "pytorch-cu124"
url = "https://download.pytorch.org/whl/cu124"
explicit = true
